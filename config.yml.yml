backend:
  name: github
  repo: TU_USUARIO/barnadrive
  branch: main

media_folder: "img"
public_folder: "/img"

collections:
  - name: "productos"
    label: "Productos"
    folder: "data"
    extension: "json"
    format: "json"
    create: false
    slug: "products"
    files:
      - label: "Lista de productos"
        name: "products"
        file: "data/products.json"
        fields:
          - label: "Productos"
            name: "items"
            widget: "list"
            fields:
              - { label: "ID", name: "id", widget: "number" }
              - { label: "Nombre", name: "name", widget: "string" }
              - label: "Categoría"
                name: "cat"
                widget: "select"
                options:
                  - { label: "Coches", value: "coches" }
                  - { label: "Grabación", value: "grabacion" }
                  - { label: "Tecnología", value: "tech" }
                  - { label: "Hogar", value: "hogar" }
                  - { label: "Deporte", value: "deporte" }
              - { label: "Emoji (si no hay foto)", name: "emoji", widget: "string" }
              - { label: "Foto del producto (URL)", name: "img", widget: "string", required: false }
              - { label: "Descripción corta (card)", name: "desc", widget: "string" }
              - label: "Etiqueta"
                name: "badge"
                widget: "select"
                options:
                  - { label: "Probado", value: "Probado" }
                  - { label: "Mi equipo", value: "Mi equipo" }
                  - { label: "Top pick", value: "Top pick" }
                  - { label: "Nuevo", value: "Nuevo" }
              - { label: "Link Amazon", name: "url", widget: "string" }
              - { label: "Tagline (cabecera detalle)", name: "tagline", widget: "string" }
              - label: "Puntos positivos"
                name: "pros"
                widget: "list"
                field: { label: "Punto", name: "item", widget: "string" }
              - { label: "Veredicto", name: "verdict", widget: "text" }
              - { label: "Descripción larga", name: "longDesc", widget: "text", required: false }

  - name: "noticias"
    label: "Noticias"
    folder: "data/news"
    extension: "json"
    format: "json"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Título", name: "title", widget: "string" }
      - label: "Categoría"
        name: "tag"
        widget: "select"
        options:
          - { label: "Motor", value: "motor" }
          - { label: "F1", value: "formula" }
          - { label: "Eléctrico", value: "ev" }
          - { label: "Tech", value: "tech" }
      - { label: "Fecha", name: "date", widget: "datetime", format: "DD MMM YYYY" }
      - { label: "Resumen", name: "summary", widget: "text" }
      - { label: "Artículo completo", name: "body", widget: "markdown", required: false }
